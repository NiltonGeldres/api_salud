# ==========================================================
# CONFIGURACIËN GENERAL - PRODUCCIËN
# ==========================================================
spring.application.name=api_salud
server.address=0.0.0.0
server.port=${PORT:8080}

# ==========================================================
# CONEXIËN A BASE DE DATOS (VIA VARIABLES DE ENTORNO)
# ==========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# ==========================================================
# CONFIGURACIËN DE CORREO (CLARO EMPRESAS)
# ==========================================================
spring.mail.host=smtp.claroempresas.com.pe
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================================
# POOL DE CONEXIONES (HIKARI) - OPTIMIZADO PARA NEON
# ==========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================================
# LOGGING PROFESIONAL
# ==========================================================
logging.level.root=INFO
logging.level.com.api_salud.api_salud=INFO
logging.level.org.springframework=WARN
