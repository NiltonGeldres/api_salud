# ==========================================================
# CONFIGURACIÓN GENERAL - PRODUCCIÓN
# ==========================================================
spring.application.name=api_salud
server.address=0.0.0.0
server.port=${PORT:8090}

# ==========================================================
# CONEXIÓN A BASE DE DATOS (VIA VARIABLES DE ENTORNO)
# ==========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# ==========================================================
# CONFIGURACIÓN DE CORREO (CLARO EMPRESAS)
# ==========================================================
spring.mail.host=smtp.claroempresas.com.pe
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================================
# POOL DE CONEXIONES (HIKARI) - OPTIMIZADO PARA NEON
# ==========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================================
# LOGGING PROFESIONAL
# ==========================================================
logging.level.root=INFO
logging.level.com.api_salud.api_salud=INFO
logging.level.org.springframework=WARN

server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/javascript
# =======================================================================
# CONFIGURACIÓN DE ALMACENAMIENTO LOCAL (ENTORNO DE DESARROLLO - WINDOWS)
# =======================================================================
# Ruta física base para las rúbricas e imágenes de las firmas de los médicos
app.storage.ruta-firmas=D:\\08_PROYECTOS\\STORAGE\\firmas\\
# Ruta física base donde se guardarán los PDFs generados de la HCE
app.storage.ruta-pdfs=D:\\08_PROYECTOS\\STORAGE\\pdfs\\