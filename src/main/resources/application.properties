# -------------------------------------------------------------------------
# 1. CONFIGURACIÓN CRÍTICA DE POSTGRESQL (Debe ser correcta)
# -------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/igm_salud_master
spring.datasource.username=postgres
spring.datasource.password=Passw0rd
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------------------------
# 2. CONFIGURACIÓN DEL CORREO (Desactivada Temporalmente)
# -------------------------------------------------------------------------
# Esto desactiva el autoconfigurador del correo, necesario para arrancar
# sin tener todas las credenciales de correo configuradas.
spring.mail.test-connection=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration