<table class="grid-2">
        <tr>
            <td><strong>Paciente:</strong> <span th:text="${atencion.paciente.name}"></span></td>
            <td><strong>N° Historia:</strong> <span th:text="${atencion.paciente.hc}"></span></td>
        </tr>
    </table>

    <div class="section">
        <div class="section-title">SIGNOS VITALES / TRIAJE</div>
        <table>
            <tr><th>Tipo</th><th>Valor</th></tr>
            <tr th:each="t : ${atencion.triaje}">
                <td th:text="${t.descripcion}"></td>
                <td th:text="${t.valorTriaje}"></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <div class="section-title">ANTECEDENTES, SÍNTOMAS Y EXAMEN FÍSICO</div>
        <p><strong>Antecedentes:</strong> <span th:each="a : ${atencion.antecedentes}" th:text="${a.descripcion + ' '}"></span></p>
        <p><strong>Síntomas:</strong> <span th:each="s : ${atencion.sintomas}" th:text="${s.descripcion + ' '}"></span></p>
        <p><strong>Examen Físico:</strong> <span th:each="ef : ${atencion.examenFisico}" th:text="${ef.descripcion + ' '}"></span></p>
    </div>

    <div class="section">
        <div class="section-title">DIAGNÓSTICOS</div>
        <table>
            <tr><th>ID Diagnóstico</th><th>Subclasificación</th></tr>
            <tr th:each="d : ${atencion.diagnosticos}">
                <td th:text="${d.idDiagnostico}"></td>
                <td th:text="${d.idSubclasificacion}"></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <div class="section-title">PLAN DE TRABAJO Y MEDICACIÓN</div>
        <table>
            <tr><th>Examen</th><th>Cantidad</th><th>Observación</th></tr>
            <tr th:each="ex : ${atencion.examenesAuxiliares}">
                <td th:text="${ex.nombre}"></td>
                <td th:text="${ex.cantidad}"></td>
                <td th:text="${ex.observacion}"></td>
            </tr>
        </table>
        
        <p><strong>Medicamentos indicados:</strong></p>
        <ul>
            <li th:each="m : ${atencion.medicacion}" 
                th:text="${'Producto ID: ' + m.idProducto + ' | Dosis: ' + m.indicaciones + ' | Cantidad: ' + m.cantidad}">
            </li>
        </ul>
    </div>

    <div class="section">
        <div class="section-title">INDICACIONES DE ALTA</div>
        <p th:each="al : ${atencion.alta}" th:text="${al.descripcion}"></p>
    </div>
